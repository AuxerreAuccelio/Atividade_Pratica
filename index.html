<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Home</title>
</head>
<body>
    
<h1>Pet Shop La Rivière</h1>

<form action="" id="home">

  
        <label for="nome"></label>
        <input type="text" name="nome" id="primeiro_nome" placeholder="PRIMEIRO NOME" required>
    

    
        <label for="sobrenome"></label>
        <input type="text" name="sobrenome" id="sobrenome" placeholder="SOBRENOME" required>
    

    
        <label for="senha"></label>
        <input type="password" name="senha" id="senhas" placeholder="SENHA" required>


  
        <label for="text"></label>
        <input type="number" name="telefone" id="telefone" placeholder="TELEFONE" required>


        <label for="text"></label>
        <input type="email" name="email" id="email" placeholder="E-MAIL" required>
    

   
        <button type="button" id="bt_login" required><strong>LOGIN</strong></button>

</form>

<script src="index.js" defer></script>

</body>
</html>
